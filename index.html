<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PTP Mobile">
<title>PTP Mobile</title>
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#242438;--text:#e8e8f0;--text2:#9090a8;--accent:#6a8aff;--accent2:#8aa0ff;--green:#4ade80;--orange:#fb923c;--red:#f87171;--border:#333350;}
/* ── HELL-MODUS (Sonnenlicht) ── */
body.light{--bg:#ffffff;--bg2:#f2f2f7;--bg3:#e5e5ea;--text:#1c1c1e;--text2:#6c6c80;--accent:#3a6adf;--accent2:#5a86f5;--green:#1a8a3c;--orange:#c96a00;--red:#c0392b;--border:#c8c8d4;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:16px;height:100%;overflow:hidden}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.screen.hidden{display:none}
/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:56px;position:sticky;top:0;z-index:10}
.hdr-title{flex:1;font-weight:600;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;min-width:44px;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
.hdr-btn.primary{background:var(--accent);border-color:var(--accent);color:white}
.hdr-btn.icon{padding:8px 10px;font-size:18px}
/* ── LOGIN ── */
#loginScreen{justify-content:center;align-items:center;padding:24px;text-align:center}
#loginScreen h1{font-size:28px;margin:0 0 12px}
#loginScreen p{color:var(--text2);margin:0 0 32px;max-width:320px;line-height:1.5}
#loginBtn{background:var(--accent);color:white;border:none;padding:16px 28px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
#loginBtn:active{opacity:.85}
.login-status{margin-top:16px;color:var(--text2);font-size:13px}
/* ── LIST ── */
.board-section{background:var(--bg2);border-bottom:2px solid var(--accent);padding:10px 12px 12px}
.board-section-label{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent2);font-weight:600;margin-bottom:6px}
.board-section-label::before{content:'📋';font-size:14px}
.board-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.board-bar::-webkit-scrollbar{display:none}
.board-chip{background:var(--bg3);border:2px solid var(--border);color:var(--text);padding:10px 16px;border-radius:22px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;min-height:42px;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.board-chip:active{transform:scale(.96)}
.board-chip.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600;box-shadow:0 2px 8px rgba(106,138,255,.3)}
/* ── STATUS-LEISTE ── */
.status-section{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 12px 10px}
.status-chip{background:var(--bg3);border:2px solid var(--border);color:var(--text2);padding:7px 13px;border-radius:18px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;min-height:36px;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.status-chip:active{transform:scale(.96)}
.status-chip.active{background:var(--bg2);border-color:var(--orange);color:var(--orange);font-weight:600}
.search-bar{padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.search-bar{position:relative}
.search-bar input{width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 36px 10px 12px;border-radius:8px;font-size:15px}
.search-clear{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px;line-height:1;display:none}
.task-list{flex:1;overflow-y:auto;padding:8px 10px 80px;-webkit-overflow-scrolling:touch}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.task-card:active{background:var(--bg3)}
.task-card-title{font-weight:600;font-size:15px;margin:0 0 4px;line-height:1.3}
.task-card-meta{display:flex;gap:10px;align-items:center;font-size:12px;color:var(--text2);flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;background:var(--bg3);border:1px solid var(--border)}
.badge.status{background:rgba(106,138,255,.15);border-color:var(--accent);color:var(--accent2)}
.badge.ampel-grün{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.badge.ampel-orange{background:rgba(251,146,60,.15);border-color:var(--orange);color:var(--orange)}
.badge.ampel-rot{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red)}
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:28px;background:var(--accent);color:white;border:none;font-size:28px;line-height:1;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:20}
.fab:active{transform:scale(.95)}
.empty{text-align:center;color:var(--text2);padding:40px 20px;font-size:14px}
/* ── DETAIL ── */
.detail-body{flex:1;overflow-y:auto;padding:12px 14px 100px;-webkit-overflow-scrolling:touch;--m-scale:1}
.sect{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.sect-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none;font-weight:600;font-size:calc(14px * var(--m-scale));text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.sect-head::after{content:'▸';transition:transform .15s;font-size:12px}
.sect.open .sect-head::after{transform:rotate(90deg)}
.sect-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border);font-size:calc(15px * var(--m-scale))}
.sect.open .sect-body{display:block}
.sect-body-always{padding:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:calc(12px * var(--m-scale));color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:calc(15px * var(--m-scale));font-family:inherit}
.field textarea{min-height:80px;resize:vertical}
.expandable-ta.expanded{min-height:calc(260px * var(--m-scale));font-size:calc(15px * var(--m-scale));line-height:1.5}
/* ── GRÖSSEN-SLIDER (immer sichtbar im Detail) ── */
.size-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:9}
.size-bar-icon{font-size:14px;color:var(--text2)}
.size-bar input[type=range]{flex:1;accent-color:var(--accent);margin:0}
.size-bar-val{font-size:12px;color:var(--text);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
.size-bar-close{background:transparent;border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:17px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.field-row{display:flex;gap:8px;align-items:flex-end}
.field-row .field{flex:1;margin-bottom:0}
.inline-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;min-height:42px}
.inline-btn.primary{background:var(--accent);border-color:var(--accent);color:white}
.inline-btn.danger{color:var(--red);border-color:var(--red)}
.termin-row,.zeit-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px}
.row-times{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.row-times input[type=date]{flex:1.5;min-width:0}
.row-times input[type=time]{flex:1;min-width:0}
.row-desc{display:flex;gap:6px;align-items:center}
.row-desc input[type=text]{flex:1;min-width:0}
.termin-row input,.zeit-row input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:13px;width:100%;box-sizing:border-box}
.rm-btn{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;height:38px;min-width:38px;cursor:pointer;font-size:16px;flex-shrink:0}
.add-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--accent2);padding:10px;border-radius:8px;margin-top:6px;cursor:pointer;font-size:14px}
.kontakt-entry{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.kontakt-entry-head{display:flex;gap:6px;margin-bottom:8px}
.kontakt-entry-head select{flex:1;padding:8px;font-size:13px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px}
.call-link{background:var(--green);color:white;text-decoration:none;padding:10px 14px;border-radius:8px;font-size:14px;display:inline-flex;align-items:center;gap:4px;min-height:42px;white-space:nowrap}
.call-link.disabled{background:var(--bg3);color:var(--text2);pointer-events:none}
.nav-link{background:var(--accent);color:white;text-decoration:none;padding:10px 14px;border-radius:8px;font-size:14px;display:inline-flex;align-items:center;gap:4px;min-height:42px;white-space:nowrap}
.save-indicator{font-size:12px;color:var(--text2);min-width:80px;text-align:right}
.save-indicator.saving{color:var(--orange)}
.save-indicator.saved{color:var(--green)}
.save-indicator.error{color:var(--red)}
/* ── TIMER ── */
.timer-bar{display:flex;gap:8px;align-items:center;padding:12px 14px;background:linear-gradient(135deg,rgba(106,138,255,.15),rgba(106,138,255,.05));border:1px solid var(--accent);border-radius:10px;margin-bottom:10px}
.timer-bar.running{background:linear-gradient(135deg,rgba(251,146,60,.15),rgba(251,146,60,.05));border-color:var(--orange)}
.timer-bar.top{position:sticky;top:0;z-index:5;margin:0 0 12px;border-width:2px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.timer-display{flex:1;font-family:'SF Mono',Consolas,monospace;font-size:20px;font-weight:600;letter-spacing:2px}
.timer-display.running{color:var(--orange)}
.timer-btn{padding:10px 18px;border-radius:8px;font-weight:600;border:none;cursor:pointer;font-size:14px;min-height:42px}
.timer-btn.start{background:var(--accent);color:white}
.timer-btn.stop{background:var(--orange);color:white}
/* ── FOTOS ── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.foto-thumb{position:relative;aspect-ratio:1;background:var(--bg3);border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.foto-thumb .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:white;border:none;width:22px;height:22px;border-radius:11px;font-size:12px;cursor:pointer;z-index:2}
.foto-thumb.fallback::before{content:'🖼️';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text2)}
/* ── LIGHTBOX (Vollbild-Vorschau) ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);touch-action:none;overflow:hidden;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-select:none;pointer-events:none;transform-origin:center center;will-change:transform;transition:none;}
.lightbox .lb-close{position:absolute;top:calc(env(safe-area-inset-top,0) + 10px);right:12px;background:rgba(0,0,0,.7);color:#fff;border:2px solid rgba(255,255,255,.35);width:44px;height:44px;border-radius:50%;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.lightbox .lb-open{position:absolute;bottom:calc(env(safe-area-inset-bottom,0) + 14px);right:12px;background:rgba(255,255,255,.92);color:#000;border:none;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;z-index:2;}
.lightbox .lb-caption{position:absolute;top:calc(env(safe-area-inset-top,0) + 14px);left:14px;color:#fff;font-size:13px;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(0,0,0,.45);padding:6px 10px;border-radius:6px;}
/* ── Foto-Beschreibung im Lightbox-Fuß ── */
.lightbox .lb-textbar{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0) + 70px);background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;color:#fff;font-size:13px;z-index:10010;display:none;max-width:calc(100% - 24px);}
.lightbox .lb-textbar.open{display:flex;flex-direction:column;gap:6px;}
.lightbox .lb-text-view{display:flex;align-items:center;gap:8px;}
.lightbox .lb-text-view-label{flex:1;color:#fff;white-space:pre-wrap;word-break:break-word;}
.lightbox .lb-text-view-label.empty{color:rgba(255,255,255,.55);font-style:italic;}
.lightbox .lb-text-edit-btn{background:rgba(255,255,255,.9);color:#000;border:none;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}
.lightbox .lb-text-edit-form{display:none;gap:6px;align-items:stretch;}
.lightbox .lb-textbar.editing .lb-text-edit-form{display:flex;}
.lightbox .lb-textbar.editing .lb-text-view{display:none;}
.lightbox .lb-text-edit-form textarea{flex:1;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;min-height:56px;resize:vertical;}
.lightbox .lb-text-edit-form button{background:rgba(255,255,255,.9);color:#000;border:none;padding:6px 10px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
.lightbox .lb-text-edit-form button.cancel{background:rgba(255,255,255,.2);color:#fff;}
/* ── 360° Pannellum Container ── */
#pannellumContainer{display:none;position:absolute;inset:0;z-index:1;}
#pannellumContainer.active{display:block;}
/* ── Zeichen-Canvas ── */
#drawCanvas{display:none;position:absolute;inset:0;cursor:crosshair;touch-action:none;z-index:20;}
#drawCanvas.active{display:block;}
/* ── Zeichen-Toolbar ── */
.lb-draw-bar{position:absolute;top:calc(env(safe-area-inset-top,0) + 56px);left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:5px;z-index:10003;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 10px;}
.lb-draw-bar.visible{display:flex;}
.lb-draw-row{display:flex;gap:5px;align-items:center;}
.lb-draw-color{width:30px;height:30px;border:2px solid rgba(255,255,255,.5);border-radius:6px;cursor:pointer;padding:1px;background:none;}
.lb-draw-size{width:70px;accent-color:#6a8aff;}
.lb-draw-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;width:34px;height:34px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-draw-btn.on{background:rgba(106,138,255,.7);border-color:#6a8aff;}
.lb-draw-btn.save{background:rgba(74,222,128,.25);border-color:#4ade80;color:#4ade80;width:auto;padding:0 12px;font-size:13px;}
.lb-draw-btn.discard{background:rgba(248,113,113,.2);border-color:#f87171;color:#f87171;width:auto;padding:0 10px;font-size:13px;}
/* Beschreibung unter dem Grid-Thumbnail */
.foto-thumb .cap-badge{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);color:#fff;font-size:10px;line-height:1.2;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
.foto-placeholder{display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text2)}
/* Anhänge (vom Desktop übertragen) */
.attach-row-mob{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:6px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.attach-thumb-mob{width:54px;height:54px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--bg2);cursor:pointer}
.attach-icon-mob{width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--bg2);border-radius:6px;flex-shrink:0}
.attach-meta-mob{flex:1;min-width:0}
.attach-name-mob{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attach-size-mob{font-size:11px;color:var(--text2);margin-top:2px}
/* ── NOTIZ VERLAUF ── */
.notiz-entry{background:var(--bg3);border-left:3px solid var(--accent);padding:8px 10px;margin-bottom:6px;border-radius:4px;font-size:13px}
.notiz-entry .ts{display:block;color:var(--text2);font-size:11px;margin-bottom:2px}
/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);padding:12px 20px;border-radius:10px;border:1px solid var(--border);z-index:100;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{background:#1a73e8;color:#fff;border-color:#1a73e8}
.hide{display:none!important}
</style>
</head>
<body>

<!-- ══ LOGIN-SCREEN ══ -->
<div id="loginScreen" class="screen">
  <h1>PTP Mobile</h1>
  <p>Verbindung zu Google Drive einrichten. Die App nutzt dieselbe <code>workboard.json</code> wie PTP am Desktop.</p>
  <button id="loginBtn" onclick="gdriveLogin()">🔐 Mit Google anmelden</button>
  <div class="login-status" id="loginStatus"></div>
</div>

<!-- ══ LISTE-SCREEN ══ -->
<div id="listScreen" class="screen hidden">
  <div class="hdr">
    <div class="hdr-title">PTP Mobile</div>
    <button class="hdr-btn icon theme-toggle-btn" onclick="toggleTheme()" title="Hell/Dunkel wechseln">☀️</button>
    <button class="hdr-btn icon" onclick="refreshData()" title="Neu laden">🔄</button>
    <button class="hdr-btn icon" onclick="openSettings()" title="Einstellungen">⚙️</button>
  </div>
  <div class="board-section">
    <div class="board-section-label" id="boardLabel">Board wählen</div>
    <div class="board-bar" id="boardBar"></div>
  </div>
  <div class="status-section" id="statusSection" style="display:none">
    <div class="board-bar" id="statusBar"></div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 Suche Titel, Kostenstelle, Adresse…" oninput="renderList();document.getElementById('searchClear').style.display=this.value?'block':'none'" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="searchClear" onclick="document.getElementById('searchInput').value='';this.style.display='none';renderList()">✕</button>
  </div>
  <div class="task-list" id="taskList"></div>
  <button class="fab" onclick="newTask()">+</button>
</div>

<!-- ══ DETAIL-SCREEN ══ -->
<div id="detailScreen" class="screen hidden">
  <div class="hdr">
    <button class="hdr-btn icon" onclick="closeDetail()">←</button>
    <div class="hdr-title" id="detailTitle">Task</div>
    <span class="save-indicator" id="saveInd"></span>
  </div>
  <div class="size-bar" id="mSizeBar">
    <span class="size-bar-icon" style="font-size:12px;color:var(--text2)">A</span>
    <input id="mSizeSlider" type="range" min="80" max="180" step="5" value="100" oninput="setMobileScale(this.value)">
    <span class="size-bar-val" id="mSizeVal">100%</span>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- ══ EINSTELLUNGEN ══ -->
<div id="settingsScreen" class="screen hidden">
  <div class="hdr">
    <button class="hdr-btn icon" onclick="closeSettings()">←</button>
    <div class="hdr-title">Einstellungen</div>
  </div>
  <div class="detail-body">
    <div class="sect open">
      <div class="sect-head" onclick="toggleMSect(this.parentElement)">Datei-Info</div>
      <div class="sect-body">

/* ═══════════════════════════════════════════════

const GDRIVE_CLIENT_ID='56419258975-2ri3eujer9p6saph1mesa5hihlcae1pl.apps.googleusercontent.com';
const GDRIVE_SCOPE='https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly';
const TOKEN_KEY='ptpm_token';
const FILE_KEY='ptpm_file';

// ── STATE ──
let gdriveToken=null;
let gdriveTokenExpires=0;
let gdriveTokenClient=null;
let fileId=null;
let fileName='workboard.json';
let userEmail='';
let boards={};            // Sichtbare Boards (nach Mobile-Whitelist gefiltert)
let hiddenBoards={};      // Desktop-only Boards: wir fassen sie nie an, schreiben sie unverändert zurück
let mobileWhitelist=[];   // Aus _mobileBoards; leer = keine Einschränkung
let statuses=[];
let currentBoard='';
let currentStatus=''; // leer = alle Spalten
let currentTaskId=null;
let saveTimer=null;
let dirty=false;

// ── UTILS ──
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function escAttr(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
// Offen-Zustand der Detail-Sektionen über Re-Renders hinweg merken.
// Per-Task, damit beim Wechsel zwischen Tasks der Zustand sauber zurückgesetzt wird.
let _mOpenSections={};
let _mOpenSectionsForTask=null;
function _resetOpenSectionsForTask(taskId){
  if(_mOpenSectionsForTask!==taskId){
    _mOpenSections={};
    _mOpenSectionsForTask=taskId;
  }
}
function isSectOpen(key){return !!_mOpenSections[key];}
function toggleExpandTA(ta){
  if(!ta)return;
  ta.classList.toggle('expanded');
  const exp=ta.classList.contains('expanded');
  // Button-Label aktualisieren (falls Toggle-Button daneben liegt)
  const fld=ta.closest('.field');
  if(fld){const btn=fld.querySelector('button.inline-btn');if(btn)btn.textContent=exp?'🔽 verkleinern':'🔍 vergrößern';}
  if(exp)ta.focus();
}
// Debounced Section-Toggle: verhindert, dass schneller Doppelklick den Zustand „open-close" selbst auslöscht.
const _mSectLastToggle=new WeakMap();
function toggleMSect(el){
  if(!el)return;
  const now=Date.now();
  const last=_mSectLastToggle.get(el)||0;
  if(now-last<350){_mSectLastToggle.set(el,now);return;}
  _mSectLastToggle.set(el,now);
  el.classList.toggle('open');
  // Zustand merken, damit ein späteres renderDetail() die Sektion nicht wieder zuklappt
  const key=el.getAttribute('data-sect');
  if(key){_mOpenSections[key]=el.classList.contains('open');}
}
function generateId(){return 't_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);}
function toast(msg,kind){const t=document.createElement('div');t.className='toast'+(kind?' '+kind:'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{try{t.remove();}catch(e){console.warn('[PTP-Mobile]',e);}},2500);}
function parseMinutes(von,bis){try{if(!von||!bis)return 0;const[vh,vm]=von.split(':').map(Number);const[bh,bm]=bis.split(':').map(Number);const d=(bh*60+bm)-(vh*60+vm);return d>0?d:0;}catch(e){return 0;}}

// ── GRÖSSEN-SLIDER (wie im Desktop-Modal) ──
const MSCALE_KEY='ptpm_detail_size';
const MSIZEBAR_KEY='ptpm_sizebar_open';
function setMobileScale(pct){
  const v=Math.max(70,Math.min(200,parseInt(pct,10)||100));
  const body=document.getElementById('detailBody');
  if(body)body.style.setProperty('--m-scale',(v/100).toFixed(2));

}
function applyStoredMobileScale(){
  let v=100;
  try{const s=localStorage.getItem(MSCALE_KEY);if(s)v=parseInt(s,10)||100;}catch(e){console.warn('[PTP-Mobile]',e);}

}
function toggleMSizeBar(){
  const bar=document.getElementById('mSizeBar');
  if(!bar)return;
  const open=!bar.classList.contains('open');
  bar.classList.toggle('open',open);
  try{localStorage.setItem(MSIZEBAR_KEY,open?'1':'0');}catch(e){console.warn('[PTP-Mobile]',e);}
  if(open)applyStoredMobileScale();
}
function applyStoredSizeBarVisibility(){

    const open=localStorage.getItem(MSIZEBAR_KEY)==='1';
    const bar=document.getElementById('mSizeBar');
    if(bar)bar.classList.toggle('open',open);

}

// ══ AUTH ══
function gdriveLogin(){
  initTokenClient();
  if(!gdriveTokenClient){document.getElementById('loginStatus').textContent='Google-Dienst noch nicht geladen, bitte kurz warten…';return;}
  gdriveTokenClient.requestAccessToken({prompt:''});
}
function initTokenClient(){
  if(gdriveTokenClient)return;
  if(!window.google||!window.google.accounts||!window.google.accounts.oauth2)return;
  gdriveTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GDRIVE_CLIENT_ID,
    scope:GDRIVE_SCOPE,
    callback:onTokenResponse
  });
}
function onTokenResponse(resp){
  if(resp.error){document.getElementById('loginStatus').textContent='Fehler: '+resp.error;return;}
  gdriveToken=resp.access_token;
  gdriveTokenExpires=Date.now()+(Number(resp.expires_in||3600)-60)*1000;
  try{localStorage.setItem(TOKEN_KEY,JSON.stringify({token:gdriveToken,exp:gdriveTokenExpires}));}catch(e){console.warn('[PTP-Mobile]',e);}
  afterLogin();
}
async function afterLogin(){
  // Versuche User-Info zu holen
  try{
    const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+gdriveToken}});
    if(r.ok){const j=await r.json();userEmail=j.email||'';}
  }catch(e){console.warn('[PTP-Mobile]',e);}
  await findOrPickFile();
}
function tokenValid(){return gdriveToken&&Date.now()<gdriveTokenExpires;}
function silentRefresh(){
  return new Promise(resolve=>{
    initTokenClient();
    if(!gdriveTokenClient){resolve(false);return;}
    const prev=gdriveTokenClient.callback;
    gdriveTokenClient.callback=(resp)=>{
      gdriveTokenClient.callback=prev;
      if(resp&&resp.access_token){
        gdriveToken=resp.access_token;
        gdriveTokenExpires=Date.now()+(Number(resp.expires_in||3600)-60)*1000;
        try{localStorage.setItem(TOKEN_KEY,JSON.stringify({token:gdriveToken,exp:gdriveTokenExpires}));}catch(e){}
        resolve(true);
      }else resolve(false);
    };
    try{gdriveTokenClient.requestAccessToken({prompt:'none'});}catch(e){console.warn('[PTP-Mobile]',e);resolve(false);}
  });
}
async function ensureToken(){
  if(tokenValid())return true;
  const ok=await silentRefresh();
  if(!ok){showLogin('Bitte erneut anmelden');return false;}
  return true;
}
function logout(){
  try{localStorage.removeItem(TOKEN_KEY);localStorage.removeItem(FILE_KEY);}catch(e){}
  const tokenToRevoke=gdriveToken;
  gdriveToken=null;gdriveTokenExpires=0;fileId=null;boards={};statuses=[];
  try{if(window.google&&google.accounts&&google.accounts.oauth2&&tokenToRevoke)google.accounts.oauth2.revoke(tokenToRevoke,()=>{});}catch(e){}
  showLogin('Abgemeldet');
}
function showLogin(msg){
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('listScreen').classList.add('hidden');
  document.getElementById('detailScreen').classList.add('hidden');
  document.getElementById('settingsScreen').classList.add('hidden');
  document.getElementById('loginStatus').textContent=msg||'';
}
function showList(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('listScreen').classList.remove('hidden');
  document.getElementById('detailScreen').classList.add('hidden');
  document.getElementById('settingsScreen').classList.add('hidden');
}

// ══ DRIVE: Datei finden / laden / speichern ══
async function _searchWorkboardInDrive(){
  const r=await fetch("https://www.googleapis.com/drive/v3/files?q=name%3D'workboard.json'%20and%20mimeType%3D'application%2Fjson'%20and%20trashed%3Dfalse&fields=files(id%2Cname%2CmodifiedTime)&orderBy=modifiedTime%20desc",
    {headers:{Authorization:'Bearer '+gdriveToken}});
  if(!r.ok)return null;
  const data=await r.json();
  const files=data.files||[];
  return files.length>0?files[0]:null;
}
async function _reconnectToNewFile(){
  // Neue workboard.json finden (z.B. vom Desktop neu erstellt)
  try{
    const found=await _searchWorkboardInDrive();
    if(found&&found.id&&found.id!==fileId){
      fileId=found.id;fileName=found.name||'workboard.json';
      try{localStorage.setItem(FILE_KEY,JSON.stringify({id:fileId,name:fileName}));}catch(e){console.warn('[PTP-Mobile]',e);}
      const ok=await loadFile();
      if(ok){renderList();toast('↻ Neue workboard.json verbunden','success');}
    }
  }catch(e){console.warn('[PTP-Mobile]',e);}
}
async function findOrPickFile(){
  document.getElementById('loginStatus').textContent='Suche workboard.json in Drive…';
  // Aus localStorage
  try{const c=JSON.parse(localStorage.getItem(FILE_KEY)||'null');if(c&&c.id){fileId=c.id;fileName=c.name||'workboard.json';const ok=await loadFile();if(ok){showList();renderList();return;}}}catch(e){console.warn('[PTP-Mobile]',e);}
  // Auf Drive suchen
  try{
    const found=await _searchWorkboardInDrive();
    if(!found){document.getElementById('loginStatus').textContent='Keine workboard.json gefunden — erst in PTP am Desktop anlegen.';return;}
    fileId=found.id;fileName=found.name||'workboard.json';
    try{localStorage.setItem(FILE_KEY,JSON.stringify({id:fileId,name:fileName}));}catch(e){console.warn('[PTP-Mobile]',e);}
    const ok=await loadFile();
    if(ok){showList();renderList();}
  }catch(e){document.getElementById('loginStatus').textContent='Drive-Fehler: '+e.message;}
}
// Splittet rohe Drive-Daten in statuses / sichtbare boards / hiddenBoards / Whitelist
let _remoteBoardStatuses={}; // wird vom Desktop gesetzt, Mobil schreibt es unverändert zurück
function _applyMobileFilter(data){
  statuses=Array.isArray(data._statuses)?data._statuses:[];
  mobileWhitelist=Array.isArray(data._mobileBoards)?data._mobileBoards.slice():[];
  _remoteBoardStatuses=(data._boardStatuses&&typeof data._boardStatuses==='object')?{...data._boardStatuses}:{};
  boards={};hiddenBoards={};
  const hasWhitelist=mobileWhitelist.length>0;
  for(const[k,v]of Object.entries(data)){
    if(k.startsWith('_'))continue;
    if(!Array.isArray(v))continue;
    // Whitelist aktiv → nur erlaubte Boards anzeigen, Rest in hiddenBoards (wird unverändert zurückgeschrieben)
    if(hasWhitelist&&!mobileWhitelist.includes(k)) hiddenBoards[k]=v;
    else boards[k]=v;
  }
}
// ── POLLING: fremde Änderungen (z.B. vom Desktop) übernehmen ──
let fileLastModified=null;
async function loadFile(){
  if(!fileId)return false;
  if(!(await ensureToken()))return false;
  try{
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media&_='+Date.now(),
      {headers:{Authorization:'Bearer '+gdriveToken,'Cache-Control':'no-cache'},cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    _applyMobileFilter(data);
    const bk=Object.keys(boards);
    if(!currentBoard||!boards[currentBoard])currentBoard=bk[0]||'';
    // modifiedTime für Poll-Vergleich aktualisieren
    try{
      const mr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?fields=modifiedTime&_='+Date.now(),
        {headers:{Authorization:'Bearer '+gdriveToken},cache:'no-store'});
      if(mr.ok){const meta=await mr.json();fileLastModified=meta.modifiedTime||fileLastModified;}
    }catch(e){console.warn('[PTP-Mobile]',e);}
    startPolling();
    return true;
  }catch(e){toast('Laden fehlgeschlagen: '+e.message,'error');return false;}
}
let pollTimer=null;
async function pollForChanges(){
  if(!fileId||!gdriveToken)return;
  // Nicht während der User tippt
  const ae=document.activeElement;
  if(ae&&['INPUT','TEXTAREA','SELECT'].includes(ae.tagName))return;
  // Nicht während lokale Änderungen auf Speicherung warten
  if(dirty)return;
  try{
    if(!(await ensureToken()))return;
    const mr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?fields=modifiedTime&_='+Date.now(),
      {headers:{Authorization:'Bearer '+gdriveToken},cache:'no-store'});
    if(!mr.ok){
      // 404 = Datei gelöscht (z.B. Neustart vom Desktop) → neue suchen
      if(mr.status===404)await _reconnectToNewFile();
      return;
    }
    const meta=await mr.json();
    if(!fileLastModified){fileLastModified=meta.modifiedTime;return;}
    if(meta.modifiedTime===fileLastModified)return;
    // Datei auf Drive ist neuer — neu laden
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media&_='+Date.now(),
      {headers:{Authorization:'Bearer '+gdriveToken,'Cache-Control':'no-cache'},cache:'no-store'});
    if(!r.ok)return;
    const data=await r.json();
    _applyMobileFilter(data);
    if(currentBoard && !boards[currentBoard]){const bk=Object.keys(boards);currentBoard=bk[0]||'';}
    currentStatus=''; // Filter zurücksetzen damit alle Änderungen sichtbar sind
    fileLastModified=meta.modifiedTime;
    if(currentTaskId){const t=findTaskById(currentTaskId);if(t)renderDetail(t);else closeDetail();}
    else renderList();
    toast('↻ Vom Desktop aktualisiert','success');
  }catch(e){console.warn('[PTP-Mobile]',e);}
}
function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(pollForChanges,20000);
  if(!window._ptpmVisHooked){
    document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')pollForChanges();});
    window._ptpmVisHooked=true;
  }
}
// Merge-Helper: Listen per Schlüssel unionen (Remote zuerst, lokale neue hinten)
function _mergeListByKey(remoteList,localList,keyFn){
  const a=Array.isArray(remoteList)?remoteList:[];
  const b=Array.isArray(localList)?localList:[];
  const out=[];const seen=new Set();
  for(const it of a){const k=keyFn(it||{});if(k&&!seen.has(k)){seen.add(k);out.push(it);}else if(!k){out.push(it);}}
  for(const it of b){const k=keyFn(it||{});if(k&&!seen.has(k)){seen.add(k);out.push(it);}else if(!k){out.push(it);}}
  return out;
}
async function saveFile(){
  if(!fileId||!gdriveToken)return;
  if(!(await ensureToken()))return;
  setSaveInd('saving','Speichere…');
  // Snapshot der aktuell offenen Task-ID – currentTaskId kann während des asynchronen
  // Saves durch closeDetail() auf null gesetzt werden; wir brauchen den ursprünglichen
  // Wert, damit der Konflikt-Handler die lokale Task findet und nicht verwirft.
  const _savingTaskId=currentTaskId;
  try{
    // ── Konflikt-Check: hat der Desktop seit unserem letzten Stand geschrieben? ──
    try{
      const mr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?fields=modifiedTime&_='+Date.now(),
        {headers:{Authorization:'Bearer '+gdriveToken},cache:'no-store'});
      if(mr.ok){
        const meta=await mr.json();
        if(fileLastModified&&meta.modifiedTime&&meta.modifiedTime!==fileLastModified){
          // Remote ist neuer → laden, dann nur die aktuell offene Task übernehmen
          const fr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media&_='+Date.now(),
            {headers:{Authorization:'Bearer '+gdriveToken,'Cache-Control':'no-cache'},cache:'no-store'});
          if(fr.ok){
            const remote=await fr.json();
            const remoteStatuses=Array.isArray(remote._statuses)?remote._statuses:statuses;
            // Remote-Whitelist auslesen — überschreibt lokale (Desktop ist Quelle der Wahrheit)
            const rWhite=Array.isArray(remote._mobileBoards)?remote._mobileBoards.slice():[];
            const rHasWhitelist=rWhite.length>0;
            // Sichtbare + versteckte Boards aus Remote aufteilen
            const remoteVisible={},remoteHidden={};
            for(const[k,v]of Object.entries(remote)){
              if(k.startsWith('_'))continue;
              if(!Array.isArray(v))continue;
              if(rHasWhitelist && !rWhite.includes(k))remoteHidden[k]=v;
              else remoteVisible[k]=v;
            }
            // Lokale Änderung der gerade offenen Task in die sichtbaren Remote-Boards mergen
            if(_savingTaskId){
              const localTask=findTaskById(_savingTaskId);
              if(localTask){
                let placed=false;
                for(const bn of Object.keys(remoteVisible)){
                  const idx=remoteVisible[bn].findIndex(t=>t&&t.id===_savingTaskId);
                  if(idx>=0){
                    const rt=remoteVisible[bn][idx];
                    // Scalars: localTask gewinnt – ABER nicht wenn localTask leer ist und Remote etwas hat
                    const mergedTask={...rt,...localTask};
                    const scalarFields=['ausführungsdatum','due','title','desc','adresse','hausverwaltung','schadensbild','owner','status','ampel','source','gdrive','nas'];
                    for(const f of scalarFields){
                      const lv=localTask[f];const rv=rt[f];
                      if((lv===''||lv===null||lv===undefined)&&rv){mergedTask[f]=rv;}
                    }
                    mergedTask.notizVerlauf=_mergeListByKey(rt.notizVerlauf,localTask.notizVerlauf,n=>((n.ts||'')+'|'+(n.text||'')));
                    mergedTask.zeitEntries=_mergeListByKey(rt.zeitEntries,localTask.zeitEntries,e=>((e.date||'')+'|'+(e.von||'')+'|'+(e.bis||'')+'|'+(e.beschreibung||'')));
                    mergedTask.ausserhausTermine=_mergeListByKey(rt.ausserhausTermine,localTask.ausserhausTermine,e=>((e.date||'')+'|'+(e.von||'')+'|'+(e.bis||'')+'|'+(e.beschreibung||'')));
                    mergedTask.fotos=_mergeListByKey(rt.fotos,localTask.fotos,f=>(f.id||f.driveId||f.path||f.name||''));
                    mergedTask.attachments=_mergeListByKey(rt.attachments,localTask.attachments,f=>((f.name||'')+'|'+(f.size||0)));
                    remoteVisible[bn][idx]=mergedTask;
                    placed=true;break;
                  }
                }
                if(!placed){
                  const target=currentBoard&&remoteVisible[currentBoard]?currentBoard:Object.keys(remoteVisible)[0];
                  if(target){if(!remoteVisible[target])remoteVisible[target]=[];remoteVisible[target].push(localTask);}
                }
              }
            }
            statuses=remoteStatuses;
            mobileWhitelist=rWhite;
            boards=remoteVisible;
            hiddenBoards=remoteHidden;
            if(remote._boardStatuses&&typeof remote._boardStatuses==='object')
              _remoteBoardStatuses={...remote._boardStatuses};
          }
        }
      }
    }catch(e){console.warn('[PTP-Mobile] Konflikt-Check:',e);}
    // Save-Objekt: Whitelist + Desktop-Spalten (_boardStatuses) erhalten, versteckte Boards durchreichen
    const obj={_statuses:statuses};
    if(Object.keys(_remoteBoardStatuses||{}).length)obj._boardStatuses={..._remoteBoardStatuses};
    if(Array.isArray(mobileWhitelist)&&mobileWhitelist.length)obj._mobileBoards=mobileWhitelist.slice();
    for(const[k,v]of Object.entries(hiddenBoards||{}))obj[k]=v;
    for(const[k,v]of Object.entries(boards||{}))obj[k]=v;
    const content=JSON.stringify(obj,null,2);
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fileId+'?uploadType=media&fields=modifiedTime',
      {method:'PATCH',headers:{Authorization:'Bearer '+gdriveToken,'Content-Type':'application/json'},body:content});
    if(!r.ok)throw new Error('HTTP '+r.status);
    try{const rm=await r.json();if(rm&&rm.modifiedTime)fileLastModified=rm.modifiedTime;}catch(e){console.warn('[PTP-Mobile]',e);}
    setSaveInd('saved','✓ Gespeichert');
    dirty=false;
    _saveRetryCount=0;
    // Nicht renderDetail(), sonst verliert der Nutzer während der Eingabe den Fokus
    // und aktive Sektionen wie Zeiterfassung/Notizen wirken als ob sie „zuklappen".
  }catch(e){
    setSaveInd('error','✗ '+e.message);
    // Automatischer Retry — sonst gehen Notizen/Zeiten verloren wenn das Netz kurz weg ist
    _saveRetryCount=(_saveRetryCount||0)+1;
    if(_saveRetryCount<=3){
      const delay=1500*_saveRetryCount;
      clearTimeout(saveTimer);
      saveTimer=setTimeout(()=>{saveFile();},delay);
    }
  }
}
let _saveRetryCount=0;
function scheduleSave(){
  dirty=true;
  setSaveInd('saving','…');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{saveFile();},1200);
}
// Sofort-Speichern (nicht debouncen) — für strukturelle Änderungen wie addNotiz/addZeit/addTermin
function forceSave(){
  dirty=true;
  clearTimeout(saveTimer);
  saveFile();
}
function setSaveInd(cls,msg){
  const el=document.getElementById('saveInd');if(!el)return;
  el.className='save-indicator '+(cls||'');el.textContent=msg||'';
  if(cls==='saved')setTimeout(()=>{if(el.textContent===msg)el.textContent='';},2500);
}
async function refreshData(){
  if(dirty){await saveFile();}
  await loadFile();
  if(currentTaskId){const t=findTaskById(currentTaskId);if(t)renderDetail(t);else closeDetail();}
  else renderList();
  toast('✓ Aktualisiert','success');
}

// ══ LISTE ══
function findTaskById(id){for(const k of Object.keys(boards)){const f=(boards[k]||[]).find(t=>t.id===id);if(f)return f;}return null;}
function findBoardByTaskId(id){for(const k of Object.keys(boards)){if((boards[k]||[]).some(t=>t.id===id))return k;}return null;}
function renderBoardBar(){
  const bar=document.getElementById('boardBar');
  const lbl=document.getElementById('boardLabel');
  const names=Object.keys(boards);
  bar.innerHTML=names.map(n=>{
    const cnt=(boards[n]||[]).length;
    return '<button class="board-chip'+(n===currentBoard?' active':'')+'" onclick="switchBoard(\''+escAttr(n)+'\')">'+esc(n)+' <span style="opacity:.7;font-size:12px;">('+cnt+')</span></button>';
  }).join('');
  if(lbl){
    if(names.length<=1){lbl.textContent='Board';}
    else{lbl.textContent='Aktuelles Board: '+currentBoard+'  ·  '+names.length+' verfügbar';}
  }
}
function switchBoard(n){currentBoard=n;currentStatus='';renderList();}
function switchStatus(s){currentStatus=(currentStatus===s?'':s);renderList();}
function renderStatusBar(){
  const sec=document.getElementById('statusSection');
  const bar=document.getElementById('statusBar');
  if(!sec||!bar)return;
  const tasks=boards[currentBoard]||[];
  if(!statuses.length){sec.style.display='none';return;}
  sec.style.display='';
  // Zähle Tasks pro Status
  const counts={};
  tasks.forEach(t=>{const s=t.status||'';counts[s]=(counts[s]||0)+1;});
  const allCount=tasks.length;
  bar.innerHTML='<button class="status-chip'+(currentStatus===''?' active':'')+'" onclick="switchStatus(\'\')">'
    +'Alle <span style="opacity:.7;font-size:11px">('+allCount+')</span></button>'
    +statuses.map(s=>{
      const cnt=counts[s]||0;
      return '<button class="status-chip'+(currentStatus===s?' active':'')+'" onclick="switchStatus(\''+escAttr(s)+'\')">'
        +esc(s)+' <span style="opacity:.7;font-size:11px">('+cnt+')</span></button>';
    }).join('');
}
function renderList(){
  renderBoardBar();
  renderStatusBar();
  const rawQ=(document.getElementById('searchInput')?.value||'');
  // Normierung: Kleinbuchstaben + Umlaute vereinfachen (ae/oe/ue/ss)
  const _norm=s=>String(s||'').toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
  const qWords=_norm(rawQ).split(/\s+/).filter(Boolean);
  const list=document.getElementById('taskList');
  const tasks=boards[currentBoard]||[];
  // Status-Filter
  let filtered=currentStatus?tasks.filter(t=>(t.status||'')===currentStatus):tasks;
  // Suche: alle Wörter müssen irgendwo auftauchen (Groß-/Kleinschreibung egal)
  if(qWords.length){
    filtered=filtered.filter(t=>{
      const hay=_norm([t.title,t.adresse,t.hausverwaltung,t.schadensbild,(t.tags||[]).join(' '),(t.kontakte||[]).map(k=>k.name).join(' ')].join(' '));
      return qWords.every(w=>hay.includes(w));
    });
  }
  if(!filtered.length){
    const hint=currentStatus?'Keine Tasks in „'+esc(currentStatus)+'"':(rawQ?'Keine Treffer für „'+esc(rawQ)+'"':'Noch keine Tasks in diesem Board.<br>Rechts unten „+" tippen.');
    list.innerHTML='<div class="empty">'+hint+'</div>';return;
  }
  const timerState=_loadTimerState();
  const runningTaskId=timerState?timerState.taskId:null;
  list.innerHTML=filtered.map(t=>{
    const ampel=t.ampel||'grün';
    const status=t.status||'';
    const ausf=t.ausführungsdatum?formatDate(t.ausführungsdatum):'';
    const isRunning=t.id===runningTaskId;
    return '<div class="task-card" onclick="openDetail(\''+escAttr(t.id)+'\')">'
      +'<div class="task-card-title">'+esc(t.title||'(ohne Titel)')+'</div>'
      +'<div class="task-card-meta">'
      +(status&&!currentStatus?'<span class="badge status">'+esc(status)+'</span>':'')
      +'<span class="badge ampel-'+ampel+'">●</span>'
      +(ausf?'<span>📅 '+esc(ausf)+'</span>':'')
      +(isRunning?'<span class="task-timer-badge" style="color:var(--orange);font-size:12px;font-weight:600;margin-left:auto">⏱ '+formatTimerFor(t.id)+'</span>':'')
      +'</div></div>';
  }).join('');
  if(runningTaskId)_startListTickLoop();else _stopListTickLoop();
}
function formatDate(iso){try{const d=new Date(iso);if(isNaN(d))return iso;return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return iso;}}

function openDetail(id){
  const t=findTaskById(id);if(!t)return;
  currentTaskId=id;
  document.getElementById('listScreen').classList.add('hidden');
  document.getElementById('detailScreen').classList.remove('hidden');
  renderDetail(t);
  // Falls für diese Task ein Timer läuft, Tick-Loop aufnehmen
  if(isTimerRunningForTask(id))_startTickLoop();
  else _stopTickLoop();
}
async function closeDetail(){
  // WICHTIG: erst auf den Save warten, dann currentTaskId zurücksetzen –
  // sonst verliert der Konflikt-Handler den Bezug zur gerade bearbeiteten Task.
  if(dirty){
    clearTimeout(saveTimer);
    try{await saveFile();}catch(e){/* saveFile hat bereits Retry/Toast */}
  }
  currentTaskId=null;
  // Sektionen beim Zurückgehen alle zuklappen — beim nächsten Öffnen beginnen alle frisch
  _mOpenSections={};
  _mOpenSectionsForTask=null;
  _stopTickLoop();
  document.getElementById('detailScreen').classList.add('hidden');
  document.getElementById('listScreen').classList.remove('hidden');
  renderList();
}

// ══ ZEITEN ══
// ── STOPPUHR (persistent über localStorage, Eintrag in task.timeEntries) ──
const MOBILE_TIMER_KEY='ptpm_timer';
let mobileTimerInterval=null;
function _loadTimerState(){try{const r=localStorage.getItem(MOBILE_TIMER_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function _saveTimerState(s){try{s?localStorage.setItem(MOBILE_TIMER_KEY,JSON.stringify(s)):localStorage.removeItem(MOBILE_TIMER_KEY);}catch(e){}}
function isTimerRunningForTask(taskId){
  const s=_loadTimerState();
  return !!(s&&s.taskId&&s.taskId===taskId);
}
function formatTimerFor(taskId){
  const s=_loadTimerState();
  if(!s||s.taskId!==taskId||!s.startMs)return '00:00:00';
  const ms=Math.max(0,Date.now()-s.startMs);
  const sec=Math.floor(ms/1000);
  return [Math.floor(sec/3600),Math.floor(sec%3600/60),sec%60].map(n=>String(n).padStart(2,'0')).join(':');
}
function _tickTimerDisplay(){
  const s=_loadTimerState();if(!s)return;
  const el=document.getElementById('timerDisplay');
  if(el)el.textContent=formatTimerFor(s.taskId);
}
function _startTickLoop(){
  if(mobileTimerInterval)clearInterval(mobileTimerInterval);
  _tickTimerDisplay();
  mobileTimerInterval=setInterval(_tickTimerDisplay,1000);
}
function _stopTickLoop(){
  if(mobileTimerInterval){clearInterval(mobileTimerInterval);mobileTimerInterval=null;}
}
function toggleMobileTimer(taskId){
  const t=findTaskById(taskId);if(!t){toast('Task nicht gefunden','error');return;}
  const s=_loadTimerState();
  if(s&&s.taskId===taskId){
    // STOPPEN → offenen timeEntry schließen, in zeitEntries als Zeile materialisieren
    const startMs=s.startMs||Date.now();
    const endMs=Date.now();
    if(!t.timeEntries)t.timeEntries=[];
    const open=t.timeEntries.find(e=>!e.end);
    if(open){open.end=endMs;}
    else{t.timeEntries.push({start:startMs,end:endMs});}
    const d1=new Date(startMs),d2=new Date(endMs);
    const pad=n=>String(n).padStart(2,'0');
    const entry={
      date:d1.toISOString().split('T')[0],
      von:pad(d1.getHours())+':'+pad(d1.getMinutes()),
      bis:pad(d2.getHours())+':'+pad(d2.getMinutes()),
      beschreibung:'Stoppuhr (Mobile)'
    };
    if(!t.zeitEntries)t.zeitEntries=[];
    t.zeitEntries.push(entry);
    _saveTimerState(null);_stopTickLoop();
    _mOpenSections['Zeiterfassung']=true;
    forceSave();
    renderDetail(t);
    toast('⏹ Stoppuhr beendet: '+entry.von+' – '+entry.bis,'success');
  }else{
    // STARTEN → alten Timer (andere Task) zu Ende bringen, neuen starten
    if(s&&s.taskId&&s.taskId!==taskId){
      const other=findTaskById(s.taskId);
      if(other){
        const startMs=s.startMs||Date.now();const endMs=Date.now();
        if(!other.timeEntries)other.timeEntries=[];
        const open=other.timeEntries.find(e=>!e.end);
        if(open)open.end=endMs;else other.timeEntries.push({start:startMs,end:endMs});
        const d1=new Date(startMs),d2=new Date(endMs);const pad=n=>String(n).padStart(2,'0');
        if(!other.timeEntries)other.timeEntries=[];
        other.timeEntries.push({date:d1.toISOString().split('T')[0],von:pad(d1.getHours())+':'+pad(d1.getMinutes()),bis:pad(d2.getHours())+':'+pad(d2.getMinutes()),beschreibung:'Stoppuhr (Mobile, auto-gestoppt)'});
      }
    }
    const now=Date.now();
    if(!t.timeEntries)t.timeEntries=[];
    t.timeEntries.push({start:now,end:null});
    _saveTimerState({taskId,startMs:now});
    _startTickLoop();
    forceSave();
    renderDetail(t);
    toast('▶ Stoppuhr läuft','success');
  }
}

// Mobile zeigt beide Listen: t.fotos (Drive-Uploads mit Thumbnail) + t.attachments (Desktop-Upload mit base64-Datei).
// Cache für Blob-URLs (driveId -> ObjectURL). Einträge werden beim Verlassen des Detail-Screens NICHT freigegeben,
// damit bei Re-Renders nicht jedes Mal neu geladen wird. Bei Logout/Reload gibt der Browser sie automatisch frei.
const _fotoBlobCache=new Map();
const _fotoBlobInflight=new Map();
async function _fetchFotoBlob(driveId){
  if(!driveId)return null;
  if(_fotoBlobCache.has(driveId))return _fotoBlobCache.get(driveId);
  if(_fotoBlobInflight.has(driveId))return _fotoBlobInflight.get(driveId);
  const p=(async()=>{
    if(!(await ensureToken()))throw new Error('Kein Token');
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+encodeURIComponent(driveId)+'?alt=media',
      {headers:{Authorization:'Bearer '+gdriveToken}});
    if(!r.ok){throw new Error('HTTP '+r.status);}
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    _fotoBlobCache.set(driveId,url);
    return url;
  })();
  _fotoBlobInflight.set(driveId,p);
  try{const url=await p;return url;}
  catch(e){console.warn('Thumb-Fetch fehlgeschlagen für',driveId,e);return null;}
  finally{_fotoBlobInflight.delete(driveId);}
}
async function loadFotoThumb(imgEl,driveId){
  if(!imgEl||!driveId)return;
  const url=await _fetchFotoBlob(driveId);
  if(url){imgEl.src=url;}
  else{imgEl.style.display='none';const p=imgEl.parentElement;if(p)p.classList.add('fallback');}
}
function hydrateFotoThumbs(){
  document.querySelectorAll('img[data-foto-id]').forEach(img=>{
    if(img.dataset.hydrated==='1')return;
    const id=img.getAttribute('data-foto-id');
    if(id){img.dataset.hydrated='1';loadFotoThumb(img,id);}
  });
}
function renderFotos(list){

  return list.map((f,i)=>{
    const name=f.name||'';

    // Cache-Hit? Dann sofort src setzen, sonst erst nach hydrateFotoThumbs
    const cached=id?_fotoBlobCache.get(id):null;
    const srcAttr=cached?('src="'+escAttr(cached)+'" ')
                 :(id?'data-foto-id="'+escAttr(id)+'" '
                     :(f.thumbnail?'src="'+escAttr(f.thumbnail)+'" ':''));
    const tip=caption?(caption+' — '+name):name;
    return '<div class="foto-thumb" onclick="openFotoFullscreen('+i+')" title="'+escAttr(tip)+'">'
      +'<img '+srcAttr+'alt="" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.classList.add(\'fallback\')">'
      +'<button class="del" onclick="event.stopPropagation();removeFoto('+i+')">✕</button>'
      +(caption?'<div class="cap-badge">'+esc(caption)+'</div>':'')
      +'</div>';

function attachIconMob(type){
  if(!type)return'📄';
  if(type.startsWith('image/'))return'🖼️';
  if(type==='application/pdf')return'📕';
  if(type.includes('word'))return'📝';
  if(type.includes('excel')||type.includes('sheet'))return'📊';
  if(type.includes('zip')||type.includes('rar'))return'🗜️';
  return'📄';
}
function formatBytesMob(n){if(!n)return'';if(n<1024)return n+' B';if(n<1024*1024)return Math.round(n/1024)+' KB';return (n/1024/1024).toFixed(1)+' MB';}
function renderAttachmentsMob(list){
  if(!list||!list.length)return '';
  return list.map((a,i)=>{
    const isImg=a.type&&a.type.startsWith('image/');
    return '<div class="attach-row-mob">'
      +(isImg?'<img class="attach-thumb-mob" src="'+escAttr(a.data||'')+'" onclick="openAttachMob('+i+')">':'<div class="attach-icon-mob" onclick="openAttachMob('+i+')" style="cursor:pointer">'+attachIconMob(a.type)+'</div>')

function openAttachMob(i){
  const t=currentTask();if(!t||!t.attachments||!t.attachments[i])return;
  const a=t.attachments[i];
  if(!a.data)return;
  if(a.type==='application/pdf'){
    // PDF als Blob-URL in neuem Tab öffnen
    try{
      const b64=a.data.includes(',')?(a.data.split(',')[1]):a.data;
      const bin=atob(b64);const bytes=new Uint8Array(bin.length);
      for(let j=0;j<bin.length;j++)bytes[j]=bin.charCodeAt(j);
      const blob=new Blob([bytes],{type:'application/pdf'});
      const url=URL.createObjectURL(blob);
      window.open(url,'_blank');
      setTimeout(()=>URL.revokeObjectURL(url),60000);
    }catch(e){downloadAttachMob(i);}
    return;
  }
  // Bilder und sonstiges → Lightbox
  openLightbox(a.data,a.name||'Anhang','');
}
function downloadAttachMob(i){
  const t=currentTask();if(!t||!t.attachments||!t.attachments[i])return;
  const a=t.attachments[i];
  if(!a.data)return;
  const link=document.createElement('a');
  link.href=a.data;link.download=a.name||'datei';
  document.body.appendChild(link);link.click();document.body.removeChild(link);
}

// ── DRIVE-FOTO-UPLOAD (Etappe 3) ──
// Zieht die Drive-Ordner-ID aus einer URL wie
// https://drive.google.com/drive/u/0/folders/1MvhZG... oder https://drive.google.com/drive/folders/1MvhZG...
function extractDriveFolderId(url){
  if(!url)return null;
  const m=String(url).match(/\/folders\/([a-zA-Z0-9_-]+)/);
  if(m)return m[1];
  // Falls nur die ID eingetragen ist
  const m2=String(url).trim().match(/^([a-zA-Z0-9_-]{20,})$/);
  return m2?m2[1]:null;
}
async function _uploadOneFotoToDrive(file,folderId){
  const ts=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const stamp=ts.getFullYear()+pad(ts.getMonth()+1)+pad(ts.getDate())+'_'+pad(ts.getHours())+pad(ts.getMinutes())+pad(ts.getSeconds());
  // Sinnvoller Dateiname: Zeitstempel_Originalname
  const origName=file.name||'foto.jpg';
  const safeName=stamp+'_'+origName.replace(/[^\w.\-]+/g,'_');
  const metadata={name:safeName,parents:[folderId],description:'PTP Mobile Upload'};
  const body=new FormData();
  body.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  body.append('file',file);
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,size,mimeType,thumbnailLink,webViewLink,webContentLink',
    {method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body});
  if(!r.ok){const txt=await r.text().catch(()=>'');throw new Error('HTTP '+r.status+(txt?': '+txt.slice(0,120):''));}
  return await r.json();
}
async function uploadFoto(files){
  if(!files||!files.length)return;
  // Sofort in ein Array kopieren – das input-Element wird direkt nach dem Aufruf
  // mit this.value='' zurückgesetzt, wodurch die FileList ungültig werden kann.
  const fileArr=Array.from(files);
  const t=currentTask();
  if(!t){toast('Keine Task geöffnet','error');return;}
  // Foto-Ordner (gdrive) – wird am Desktop gesetzt, hier nur genutzt
  const folderId=extractDriveFolderId(t.gdrive);
  if(!folderId){
    toast('❗ Foto-Ordner fehlt – bitte am Desktop unter Verknüpfungen eintragen','error');
    _mOpenSections['Fotos']=true;
    renderDetail(t);
    return;
  }
  if(!(await ensureToken())){toast('Nicht angemeldet','error');return;}
  const n=fileArr.length;
  toast('⬆ Lade '+n+' Foto(s) hoch …','info');
  if(!t.fotos)t.fotos=[];
  let success=0,failed=0,lastErr='';
  for(let i=0;i<n;i++){
    const file=fileArr[i];
    try{
      const meta=await _uploadOneFotoToDrive(file,folderId);
      t.fotos.push({
        driveId:meta.id,
        name:meta.name,
        mimeType:meta.mimeType||file.type||'image/jpeg',
        size:Number(meta.size)||file.size||0,
        thumbnail:meta.thumbnailLink||('https://drive.google.com/thumbnail?id='+meta.id+'&sz=w400'),
        url:meta.webViewLink||('https://drive.google.com/file/d/'+meta.id+'/view'),
        download:meta.webContentLink||'',
        uploadedAt:new Date().toISOString(),
        source:'mobile'
      });
      success++;
      _mOpenSections['Fotos']=true;
    }catch(e){failed++;lastErr=e.message||String(e);console.error('Foto-Upload-Fehler:',e);}
  }
  // Immer sichern & neu rendern
  forceSave();
  renderDetail(t);
  if(success&&!failed)toast('✓ '+success+' Foto(s) in Drive hochgeladen','success');
  else if(success&&failed)toast('⚠ '+success+' hochgeladen, '+failed+' fehlgeschlagen','error');
  else toast('✗ Upload fehlgeschlagen: '+lastErr,'error');
}
// Tap auf Thumbnail → Lightbox in der App (mit Fallback-Link zum Drive-Viewer)
async function openFotoFullscreen(i){
  const t=currentTask();if(!t||!t.fotos||!t.fotos[i])return;
  const f=t.fotos[i];
  const viewUrl=f.url||(f.driveId?'https://drive.google.com/file/d/'+f.driveId+'/view':'');
  // Erst Lightbox öffnen (mit Cache-Hit, falls vorhanden), dann ggf. nachladen.
  const cached=f.driveId?_fotoBlobCache.get(f.driveId):null;
  openLightbox(cached||'',f.name||'Foto',viewUrl,{fotoIdx:i,caption:f.caption||''});
  if(!cached&&f.driveId){
    const url=await _fetchFotoBlob(f.driveId);
    if(url){

function _extractFolderIdMob(url){
  if(!url)return null;
  const m=String(url).match(/\/folders\/([a-zA-Z0-9_-]+)/);
  if(m)return m[1];
  const m2=String(url).trim().match(/^([a-zA-Z0-9_-]{20,})$/);
  return m2?m2[1]:null;
}
async function _mobDriveCreateFolder(name,parentId){
  const r=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{Authorization:'Bearer '+gdriveToken,'Content-Type':'application/json'},
    body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]})
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
  return(await r.json()).id;
}
async function _mobDriveCreateTextFile(name,content,parentId){
  const meta={name,mimeType:'text/plain',parents:[parentId]};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',new Blob([content],{type:'text/plain;charset=utf-8'}));
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body:form
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
}

    const zeitH=Math.floor(zeitMin/60),zeitM=zeitMin%60;

    }

    }
    if((t.ausserhausTermine||[]).length){

    }

      t.fotos.forEach((f,i)=>{txt+=(i+1)+'. '+(f.name||'Foto')+(f.caption?' — '+f.caption:'')+'\n';});

<script>
function _loadPiexif(cb){
  if(window.piexif){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.js';
  s.onload=cb;s.onerror=()=>{console.warn('[PTP-Mobile] piexif load error');};
  document.head.appendChild(s);
}
function embedExifCaption(dataUrl,caption){
  try{
    if(!window.piexif)return dataUrl;
    let exifObj;
    try{exifObj=piexif.load(dataUrl);}
    catch(e){exifObj={'0th':{},'Exif':{},'GPS':{},'1st':{},'thumbnail':null};}
    if(!exifObj['0th'])exifObj['0th']={};
    exifObj['0th'][piexif.ImageIFD.ImageDescription]=caption;
    const exifBytes=piexif.dump(exifObj);
    return piexif.insert(exifBytes,dataUrl);
  }catch(e){console.warn('[PTP-Mobile] EXIF:',e);return dataUrl;}
}
async function _embedExifInDrive(driveId,caption){
  if(!driveId||!caption)return;
  if(!window.piexif)await new Promise(r=>_loadPiexif(r));
  if(!window.piexif)return;
  // Foto aus Drive laden
  const blobUrl=await _fetchFotoBlob(driveId);
  if(!blobUrl)return;
  // Blob → DataURL
  const blob=await fetch(blobUrl).then(r=>r.blob());
  const dataUrl=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=e=>res(e.target.result);fr.onerror=rej;fr.readAsDataURL(blob);});
  if(!dataUrl.startsWith('data:image/jpeg')&&!dataUrl.startsWith('data:image/jpg'))return;
  // EXIF einbetten
  const newDataUrl=embedExifCaption(dataUrl,caption);
  if(newDataUrl===dataUrl)return;
  // DataURL → Blob
  const b64=newDataUrl.split(',')[1];
  const bin=atob(b64);const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const newBlob=new Blob([bytes],{type:'image/jpeg'});
  // In Drive überschreiben
  await fetch('https://www.googleapis.com/upload/drive/v3/files/'+encodeURIComponent(driveId)+'?uploadType=media',
    {method:'PATCH',headers:{Authorization:'Bearer '+gdriveToken,'Content-Type':'image/jpeg'},body:newBlob});
  // Cache leeren → nächster Load zeigt neues Bild
  _fotoBlobCache.delete(driveId);
}
</script>

// ── 360° Pannellum (lazy load) ──
function _lbInitPannellum(blobUrl){
  const container=document.getElementById('pannellumContainer');
  const img=document.getElementById('lbImg');
  if(!container)return;
  img.style.display='none';
  container.innerHTML='<div style="color:#fff;font-size:13px;padding:20px;text-align:center">⏳ 360°-Viewer lädt…</div>';
  container.classList.add('active');
  function _startViewer(){
    container.innerHTML='';
    _pannellumViewer=pannellum.viewer(container,{
      type:'equirectangular',panorama:blobUrl,
      autoLoad:true,showControls:false,compass:false,
      mouseZoom:true,draggable:true,
    });
  }
  if(window.pannellum){_startViewer();return;}

  const cssLink=document.getElementById('pannellumCSS');

function _lbClosePannellum(){

}
// ── Zeichen-Tool ──
let _drawPointer=null,_drawCtx=null,_drawErasing=false,_drawMode='pen',_drawSnapshot=null;
function lbSetMode(mode,btn){
  _drawMode=mode;_drawErasing=(mode==='erase');
  document.querySelectorAll('#lbDrawBar .lb-draw-btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
}
function lbStartDraw(){
  const img=document.getElementById('lbImg');
  if(!img||!img.src||img.style.display==='none')return;
  const canvas=document.getElementById('drawCanvas');
  if(!canvas)return;
  const lb=document.getElementById('lightbox');
  // Canvas bleibt position:absolute innerhalb der Lightbox
  canvas.style.position='absolute';
  canvas.style.left='0';canvas.style.top='0';
  canvas.style.width='100%';canvas.style.height='100%';
  // Pixelgröße = Lightbox-Größe (kein fixed, kein devicePixelRatio-Problem)
  canvas.width=lb.offsetWidth||window.innerWidth;
  canvas.height=lb.offsetHeight||window.innerHeight;
  _drawCtx=canvas.getContext('2d');
  _drawErasing=false;
  canvas.classList.add('active');
  document.getElementById('lbDrawBar').classList.add('visible');
  canvas.addEventListener('pointerdown',_onDrawDown);
  canvas.addEventListener('pointermove',_onDrawMove);
  canvas.addEventListener('pointerup',_onDrawUp);
  canvas.addEventListener('pointercancel',_onDrawUp);
}
function _onDrawDown(e){
  e.preventDefault();
  document.getElementById('drawCanvas').setPointerCapture(e.pointerId);
  _drawPointer={x:e.offsetX,y:e.offsetY};
  if(_drawMode==='rect'||_drawMode==='circ'||_drawMode==='line'||_drawMode==='arrow'){
    _drawSnapshot=_drawCtx.getImageData(0,0,_drawCtx.canvas.width,_drawCtx.canvas.height);
  }else{
    _drawCtx.beginPath();_drawCtx.moveTo(e.offsetX,e.offsetY);
  }
}
function _onDrawMove(e){
  if(!_drawPointer)return;
  e.preventDefault();
  const ctx=_drawCtx;
  const size=parseInt(document.getElementById('drawSize')?.value||5);
  const color=document.getElementById('drawColor')?.value||'#ff0000';
  if(_drawMode==='erase'){
    ctx.globalCompositeOperation='destination-out';
    ctx.lineWidth=size*3;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);
  }else if(_drawMode==='rect'||_drawMode==='circ'||_drawMode==='line'||_drawMode==='arrow'){
    if(_drawSnapshot)ctx.putImageData(_drawSnapshot,0,0);
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';
    const x0=_drawPointer.x,y0=_drawPointer.y,x1=e.offsetX,y1=e.offsetY;
    ctx.beginPath();
    if(_drawMode==='rect'){
      ctx.lineCap='square';ctx.strokeRect(x0,y0,x1-x0,y1-y0);
    }else if(_drawMode==='circ'){
      const rx=Math.abs(x1-x0)/2,ry=Math.abs(y1-y0)/2;
      ctx.ellipse(x0+(x1-x0)/2,y0+(y1-y0)/2,rx,ry,0,0,2*Math.PI);ctx.stroke();
    }else if(_drawMode==='line'){
      ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
    }else if(_drawMode==='arrow'){
      _lbDrawArrow(ctx,x0,y0,x1,y1,size,color);
    }
  }else{
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);
  }
}
function _onDrawUp(e){
  if(_drawMode==='rect'||_drawMode==='circ'||_drawMode==='line'||_drawMode==='arrow')_drawSnapshot=null;
  _drawPointer=null;
}
function _lbDrawArrow(ctx,x0,y0,x1,y1,size,color){
  const headLen=Math.max(16,size*5);
  const angle=Math.atan2(y1-y0,x1-x0);
  ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x1-headLen*Math.cos(angle-Math.PI/6),y1-headLen*Math.sin(angle-Math.PI/6));
  ctx.moveTo(x1,y1);
  ctx.lineTo(x1-headLen*Math.cos(angle+Math.PI/6),y1-headLen*Math.sin(angle+Math.PI/6));
  ctx.stroke();
}
function lbDiscardDraw(){
  _drawPointer=null;_drawErasing=false;
  const c=document.getElementById('drawCanvas');
  if(c){
    c.classList.remove('active');
    c.removeEventListener('pointerdown',_onDrawDown);
    c.removeEventListener('pointermove',_onDrawMove);
    c.removeEventListener('pointerup',_onDrawUp);
    c.removeEventListener('pointercancel',_onDrawUp);
    const ctx=c.getContext('2d');if(ctx)ctx.clearRect(0,0,c.width,c.height);
  }
  const bar=document.getElementById('lbDrawBar');
  if(bar)bar.classList.remove('visible');
}
async function lbSaveDraw(){
  const img=document.getElementById('lbImg');
  const drawCanvas=document.getElementById('drawCanvas');
  if(!img||!drawCanvas)return;
  const t=currentTask();
  if(!t||_lbFotoIdx<0||!t.fotos||!t.fotos[_lbFotoIdx]){toast('Kein Foto gewählt','error');lbDiscardDraw();return;}
  const f=t.fotos[_lbFotoIdx];
  // Bild-Position im Fenster ermitteln (für Koordinaten-Mapping)
  const imgRect=img.getBoundingClientRect();
  // Merge-Canvas in Originalauflösung
  const mc=document.createElement('canvas');
  mc.width=img.naturalWidth||drawCanvas.width;mc.height=img.naturalHeight||drawCanvas.height;
  const mCtx=mc.getContext('2d');
  mCtx.drawImage(img,0,0,mc.width,mc.height);
  // Zeichnung skaliert einzeichnen: nur den Bereich über dem Bild
  mCtx.drawImage(drawCanvas,
    imgRect.left,imgRect.top,imgRect.width,imgRect.height, // Quelle im Canvas
    0,0,mc.width,mc.height);                               // Ziel in Originalauflösung
  const blob=await new Promise(r=>mc.toBlob(r,'image/jpeg',0.92));
  if(!blob){toast('Fehler beim Erstellen','error');lbDiscardDraw();return;}
  const folderId=extractDriveFolderId(t.gdrive);
  if(!folderId){toast('Kein Drive-Ordner verknüpft – Zeichnung wird verworfen','error');lbDiscardDraw();return;}
  if(!(await ensureToken())){toast('Nicht angemeldet','error');lbDiscardDraw();return;}
  const base=(f.name||'foto.jpg').replace(/\.[^.]+$/,'');
  const copyName=base+'_zeichnung.jpg';
  const body=new FormData();
  body.append('metadata',new Blob([JSON.stringify({name:copyName,parents:[folderId]})],{type:'application/json'}));
  body.append('file',blob,'blob.jpg');
  toast('⬆ Zeichnung wird gespeichert…','info');
  let r;
  try{
    r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,mimeType',
      {method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body});
  }catch(e){toast('Netzwerkfehler beim Speichern','error');lbDiscardDraw();return;}
  if(!r.ok){toast('Fehler beim Speichern ('+r.status+')','error');lbDiscardDraw();return;}
  const meta=await r.json().catch(()=>null);
  toast('✓ Zeichnung in Drive gespeichert','success');
  // Neue Datei in t.fotos eintragen → Vorschau wird sofort aktualisiert
  if(meta&&meta.id){
    if(!t.fotos)t.fotos=[];
    const newFoto={driveId:meta.id,name:copyName,mimeType:'image/jpeg',caption:'Zeichnung'};
    t.fotos.push(newFoto);
    // Blob-URL im Cache ablegen, damit kein erneuter Drive-Download nötig ist
    const blobUrl=URL.createObjectURL(blob);
    _fotoBlobCache.set(meta.id,blobUrl);
    forceSave();
    // Foto-Sektion öffnen und Detail neu rendern → Thumbnail erscheint sofort
    _mOpenSections['Fotos']=true;
    const tNow=currentTask();if(tNow)renderDetail(tNow);
  }
  lbDiscardDraw();
}
function _lbShowCaption(txt){
  const lbl=document.getElementById('lbTextViewLabel');
  if(!lbl)return;
  if(txt&&String(txt).trim()){
    lbl.textContent=String(txt);
    lbl.classList.remove('empty');
  }else{
    lbl.textContent='Keine Beschreibung';
    lbl.classList.add('empty');
  }
}
async function lbEditCaption(){
  // Wenn Zeichnen aktiv ist, zuerst automatisch speichern
  const canvas=document.getElementById('drawCanvas');
  if(canvas&&canvas.classList.contains('active')){
    await lbSaveDraw();
    // Kurz warten bis Canvas-State zurückgesetzt ist
    await new Promise(r=>setTimeout(r,80));
  }
  if(_lbFotoIdx<0)return;
  const t=currentTask();if(!t||!t.fotos||!t.fotos[_lbFotoIdx])return;
  const f=t.fotos[_lbFotoIdx];
  const ta=document.getElementById('lbTextInput');
  if(ta){ta.value=f.caption||'';}
  document.getElementById('lbTextbar').classList.add('editing');
  if(ta){setTimeout(()=>{ta.focus();},80);}
}
function lbCancelCaption(){
  document.getElementById('lbTextbar').classList.remove('editing');
}
async function lbSaveCaption(){
  if(_lbFotoIdx<0)return;
  const t=currentTask();if(!t||!t.fotos||!t.fotos[_lbFotoIdx])return;
  const ta=document.getElementById('lbTextInput');
  const val=ta?ta.value.trim():'';
  const f=t.fotos[_lbFotoIdx];
  f.caption=val;
  // Caption sofort im JSON sichern
  forceSave();
  _lbShowCaption(val);
  document.getElementById('lbTextbar').classList.remove('editing');
  try{_updateFotoCaptionBadge(_lbFotoIdx,val);}catch(e){}
  toast('✓ Beschreibung gespeichert','success');
  // EXIF + Textkopie asynchron (nur JPEG, nur wenn Text vorhanden)
  if(val && f.driveId && (f.mimeType==='image/jpeg'||f.mimeType==='image/jpg')){
    try{
      if(!(await ensureToken()))return;
      // 1) EXIF in Original einbetten
      await _embedExifInDrive(f.driveId,val);
      toast('✓ EXIF im Original gespeichert','success');
      // 2) Textkopie mit eingebranntem Text erstellen
      const folderId=extractDriveFolderId(t.gdrive);
      if(folderId){
        await _uploadTextCopyToDrive(f,val,folderId);
        toast('✓ Textkopie in Drive erstellt','success');
      }
    }catch(e){console.warn('[PTP-Mobile] EXIF/Textkopie-Upload:',e);}
  }
}
// ── Text visuell ins Bild einbrennen und als Kopie hochladen ──
async function _uploadTextCopyToDrive(foto,text,folderId){
  // Original-Blob aus Drive laden
  const blobUrl=await _fetchFotoBlob(foto.driveId);
  if(!blobUrl)return;
  const origBlob=await fetch(blobUrl).then(r=>r.blob());
  // Auf Canvas zeichnen + Text einbrennen
  const textBlob=await _burnTextOntoBlob(origBlob,text);
  if(!textBlob)return;
  // Dateiname: Originalname + _text
  const origName=foto.name||'foto.jpg';
  const ext=origName.match(/\.[^.]+$/)?.[0]||'.jpg';
  const base=origName.replace(/\.[^.]+$/,'');
  const copyName=base+'_text'+ext;
  // In Drive hochladen (neue Datei)
  const metadata={name:copyName,parents:[folderId],description:'Textkopie: '+text};
  const body=new FormData();
  body.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  body.append('file',textBlob,'blob.jpg');
  await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {method:'POST',headers:{Authorization:'Bearer '+gdriveToken},body});
}
// ── Canvas: Text als Balken unten ins Bild einbrennen ──
function _burnTextOntoBlob(srcBlob,text){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(srcBlob);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const W=img.naturalWidth,H=img.naturalHeight;
      const canvas=document.createElement('canvas');
      canvas.width=W;canvas.height=H;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      const fs=Math.max(18,Math.round(W/28));
      ctx.font='bold '+fs+'px Arial,sans-serif';
      const pad=Math.round(fs*0.5);
      const barH=fs+pad*2;
      // Halbtransparenter schwarzer Balken unten
      ctx.fillStyle='rgba(0,0,0,0.55)';
      ctx.fillRect(0,H-barH,W,barH);
      // Weißer Text
      ctx.fillStyle='#ffffff';
      ctx.textBaseline='middle';
      ctx.fillText(text,pad,H-barH/2,W-pad*2);
      canvas.toBlob(b=>resolve(b),'image/jpeg',0.92);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}
function _updateFotoCaptionBadge(i,txt){
  const thumb=document.querySelectorAll('#fotoGrid .foto-thumb')[i];
  if(!thumb)return;
  let badge=thumb.querySelector('.cap-badge');
  if(txt){
    if(!badge){badge=document.createElement('div');badge.className='cap-badge';thumb.appendChild(badge);}
    badge.textContent=txt;
  }else if(badge){badge.remove();}
}
async function closeLightbox(){
  _lbClosePannellum();
  // Wenn Zeichnen noch aktiv ist, automatisch speichern bevor geschlossen wird
  const canvas=document.getElementById('drawCanvas');
  if(canvas&&canvas.classList.contains('active')){
    await lbSaveDraw();
  }else{
    lbDiscardDraw();
  }
  _lbResetZoom();
  const lb=document.getElementById('lightbox');
  lb.classList.remove('open');
  const img=document.getElementById('lbImg');
  img.src='';img.onerror=null;img.onload=null;img.style.display='';
  _lbCurrentUrl='';
  _lbFotoIdx=-1;
  const bar=document.getElementById('lbTextbar');
  if(bar)bar.classList.remove('open','editing');
  document.removeEventListener('keydown',_lbOnKey);
}
function _lbOnKey(e){if(e.key==='Escape'){closeLightbox();}}
function lbOpenOriginal(){if(_lbCurrentUrl)window.open(_lbCurrentUrl,'_blank');}

// ── PINCH-TO-ZOOM & PAN ──
let _lbScale=1,_lbTX=0,_lbTY=0;
let _lbPinchDist0=0,_lbScale0=1;
let _lbPan0X=0,_lbPan0Y=0,_lbPanTX0=0,_lbPanTY0=0;
let _lbPinching=false,_lbPanning=false;
let _lbLastTap=0;

function _lbDist(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}
function _lbResetZoom(){
  _lbScale=1;_lbTX=0;_lbTY=0;
  const img=document.getElementById('lbImg');
  if(img)img.style.transform='';
}
function _lbApply(){
  const img=document.getElementById('lbImg');
  if(img)img.style.transform='scale('+_lbScale+') translate('+_lbTX+'px,'+_lbTY+'px)';
}
function _lbHandleTap(e){
  // Schließen nur wenn nicht gezoomt und Klick direkt auf Hintergrund (nicht auf Buttons etc.)
  if(_lbScale>1.05)return;
  if(e.target.closest('button,a,input,textarea,select,.lb-textbar,.lb-caption'))return;
  closeLightbox();
}
function _lbOnTouchStart(e){
  if(document.getElementById('drawCanvas').classList.contains('active'))return;
  if(e.touches.length===2){
    e.preventDefault();
    _lbPinching=true;_lbPanning=false;
    _lbPinchDist0=_lbDist(e.touches[0],e.touches[1]);
    _lbScale0=_lbScale;
  } else if(e.touches.length===1){
    const now=Date.now();
    if(now-_lbLastTap<300){
      // Doppeltipp → Zoom zurücksetzen
      _lbResetZoom();
      _lbLastTap=0;
      e.preventDefault();
      return;
    }
    _lbLastTap=now;
    if(_lbScale>1.05){
      e.preventDefault();
      _lbPanning=true;_lbPinching=false;
      _lbPan0X=e.touches[0].clientX;
      _lbPan0Y=e.touches[0].clientY;
      _lbPanTX0=_lbTX;_lbPanTY0=_lbTY;
    }
  }
}
function _lbOnTouchMove(e){
  if(document.getElementById('drawCanvas').classList.contains('active'))return;
  if(_lbPinching&&e.touches.length===2){
    e.preventDefault();
    const dist=_lbDist(e.touches[0],e.touches[1]);
    _lbScale=Math.min(6,Math.max(1,_lbScale0*(dist/_lbPinchDist0)));
    _lbApply();
  } else if(_lbPanning&&e.touches.length===1&&_lbScale>1){
    e.preventDefault();
    const dx=(e.touches[0].clientX-_lbPan0X)/_lbScale;
    const dy=(e.touches[0].clientY-_lbPan0Y)/_lbScale;
    _lbTX=_lbPanTX0+dx;
    _lbTY=_lbPanTY0+dy;
    _lbApply();
  }
}
function _lbOnTouchEnd(e){
  if(e.touches.length<2)_lbPinching=false;
  if(e.touches.length===0)_lbPanning=false;
  if(_lbScale<1.05){_lbScale=1;_lbTX=0;_lbTY=0;_lbApply();}
}
// Event-Listener einmal beim Laden anhängen
(function(){
  const lb=document.getElementById('lightbox');
  if(!lb)return;
  lb.addEventListener('touchstart',_lbOnTouchStart,{passive:false});
  lb.addEventListener('touchmove',_lbOnTouchMove,{passive:false});
  lb.addEventListener('touchend',_lbOnTouchEnd,{passive:true});
})();
</script>
